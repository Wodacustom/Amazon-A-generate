services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-aplus_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aplus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - aplus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rustfs-permissions:
    image: alpine:3.20
    command: sh -c "chown -R 10001:10001 /data0 /data1 /data2 /data3 /logs"
    volumes:
      - rustfs_data_0:/data0
      - rustfs_data_1:/data1
      - rustfs_data_2:/data2
      - rustfs_data_3:/data3
      - rustfs_logs:/logs
    networks:
      - aplus_network

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_VOLUMES: /data/rustfs{0...3}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: ${RUSTFS_UNSAFE_BYPASS_DISK_CHECK:-true}
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
      - rustfs_logs:/app/logs
    depends_on:
      rustfs-permissions:
        condition: service_completed_successfully
    networks:
      - aplus_network
    ports:
      - "${RUSTFS_API_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "sh", "-ec", "curl -fsS http://127.0.0.1:9000/health && curl -fsS http://127.0.0.1:9001/rustfs/console/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-aplus-agent-api}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:password@postgres:5432/aplus_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://rustfs:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aplus-agent}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mock-hash-v1}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-8}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-mock-a-plus-v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    networks:
      - aplus_network
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_PORT:-8002}:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      - backend
    networks:
      - aplus_network
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres_data:
  redis_data:
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
  rustfs_logs:

networks:
  aplus_network:
    driver: bridge
